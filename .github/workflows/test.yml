name: CI — IPAM ABX Actions

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests urllib3

      - name: Run allocate tests
        env:
          IPAM_URL: https://ipam.test/api
          IPAM_APP_ID: aria
          IPAM_TOKEN: test-token-ci
          SUBNET_ID: "3"
          IPAM_VERIFY_SSL: "false"
        run: |
          pytest tests/test_allocate.py -v

      - name: Run deallocate tests
        env:
          IPAM_URL: https://ipam.test/api
          IPAM_APP_ID: aria
          IPAM_TOKEN: test-token-ci
          SUBNET_ID: "3"
          IPAM_VERIFY_SSL: "false"
        run: |
          pytest tests/test_deallocate.py -v

      - name: Run full test suite with coverage report
        env:
          IPAM_URL: https://ipam.test/api
          IPAM_APP_ID: aria
          IPAM_TOKEN: test-token-ci
          SUBNET_ID: "3"
          IPAM_VERIFY_SSL: "false"
        run: |
          pip install pytest-cov
          pytest tests/ -v --cov=abx-actions --cov-report=term-missing
